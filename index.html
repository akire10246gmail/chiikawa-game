<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花椰菜燉燉雞爭奪戰</title>
    <style>
        body { font-family: sans-serif; background-color: #fff0f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* 啟動蓋板 - 確保 100% 覆蓋並顯示圖片 */
        #start-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff0f5; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999; 
        }
        #start-title { font-size: 4rem; font-weight: 900; color: #ff69b4; margin-bottom: 20px; }
        #start-img { 
            width: 400px; height: 400px; border-radius: 30px; 
            object-fit: cover; border: 10px solid white; 
            box-shadow: 0 10px 30px rgba(255,182,193,0.6); margin-bottom: 30px; 
        }
        #start-btn { padding: 25px 60px; font-size: 3rem; background: #ffb6c1; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }

        /* 主容器 */
        .container { background: white; padding: 2.5rem; border-radius: 40px; border: 8px solid #ffb6c1; width: 90%; max-width: 1000px; display: flex; align-items: center; gap: 30px; position: relative; }

        .pic-area { flex: 1; height: 400px; display: flex; justify-content: center; align-items: center; }
        #char-img { max-width: 100%; max-height: 100%; border-radius: 20px; }

        .info-area { flex: 1; text-align: center; }
        #msg { font-size: 2rem; color: #ff69b4; font-weight: bold; }
        .range-text { font-size: 6rem; font-weight: 900; color: #ff69b4; margin: 20px 0; }
        input { width: 150px; font-size: 3rem; text-align: center; border: 4px solid #ffb6c1; border-radius: 15px; outline: none; }
        #go-btn { font-size: 2rem; padding: 10px 30px; background: #ffb6c1; color: white; border: none; border-radius: 15px; cursor: pointer; }

        /* 勝利層 */
        #win-layer { 
            display: none; position: absolute; inset: 0; background: white; 
            flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 32px; z-index: 5000; 
        }
        marquee { width: 100%; font-size: 3.5rem; color: #ff1493; font-weight: bold; background: #fff0f5; padding: 15px 0; position: absolute; top: 0; }
        #win-img { max-width: 80%; max-height: 70%; margin-top: 60px; border-radius: 20px; }
        .re-btn { margin-top: 20px; padding: 10px 40px; font-size: 1.5rem; background: #ff8da1; color: white; border: none; border-radius: 10px; cursor: pointer; }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, 2px); } }
    </style>
</head>
<body>

<div id="start-overlay">
    <div id="start-title">花椰菜燉燉雞爭奪戰</div>
