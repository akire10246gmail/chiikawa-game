<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花椰菜燉燉雞爭奪戰 - 最終勝利版</title>
    <style>
        body { font-family: 'Arial', 'Microsoft JhengHei', sans-serif; background-color: #fff0f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* 開始畫面 */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 240, 245, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        #start-title { font-size: 5rem; font-weight: 900; color: #ff69b4; margin-bottom: 20px; text-shadow: 4px 4px 0px white; }
        #start-img { width: 450px; height: 450px; border-radius: 40px; object-fit: cover; border: 12px solid white; box-shadow: 0 15px 40px rgba(255, 182, 193, 0.8); margin-bottom: 30px; }
        #start-btn { padding: 25px 70px; font-size: 3.5rem; background-color: #ffb6c1; color: white; border: none; border-radius: 60px; cursor: pointer; box-shadow: 0 10px 25px rgba(255, 182, 193, 0.8); transition: 0.2s; font-weight: bold; }

        /* 遊戲主容器 */
        .container { 
            background: white; padding: 3rem; border-radius: 50px; 
            box-shadow: 0 25px 70px rgba(255, 182, 193, 0.6); 
            display: flex; flex-direction: row; align-items: center; 
            border: 10px solid #ffb6c1; max-width: 1200px; width: 95%; min-height: 600px; gap: 50px; transition: 0.5s;
        }

        /* 答對時的容器狀態：改為垂直排列並置中 */
        .container.win-layout { flex-direction: column !important; justify-content: center !important; align-items: center !important; text-align: center; }

        /* 左側圖片/影片區 */
        .pic-area { flex: 1; height: 500px; background: #fffafb; border-radius: 40px; display: flex; justify-content: center; align-items: center; border: 5px dashed #ffe4e1; overflow: hidden; position: relative; transition: 0.5s; }
        
        /* 答對時影片區放大 */
        .pic-area.win-video-full { width: 100%; height: 550px; flex: none; border: none; background: transparent; }
        
        #char-img, #win-video { max-height: 95%; max-width: 95%; object-fit: contain; }
        #win-video { width: 100%; height: 100%; max-height: 100%; }

        /* 右側控制區 */
        .info-area { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        .speech-bubble-area { display: flex; align-items: center; background: #fff0f5; padding: 20px 40px; border-radius: 60px; border: 4px solid #ffb6c1; margin-bottom: 20px; width: 100%; justify-content: center; gap: 30px; }
        .avatar { width: 110px; height: 110px; border-radius: 50%; border: 3px solid white; background: white; overflow: hidden; flex-shrink: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        #msg { font-size: 2.8rem; color: #ff69b4; font-weight: bold; margin: 0; }

        .range-text { font-size: 9rem; font-weight: 900; color: #ff69b4; margin: 20px 0; line-height: 1; }
        
        .input-group { display: flex; align-items: center; gap: 20px; margin-top: 20px; }
        input { width: 180px; font-size: 3.5rem; padding: 15px; border: 6px solid #ffb6c1; border-radius: 25px; text-align: center; outline: none; }
        #go-btn { font-size: 2.5rem; padding: 15px 50px; background: #ffb6c1; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        
        /* 勝利訊息文字：加大並確保置中 */
        #win-msg { font-size: 3.8rem; color: #ff1493; font-weight: 900; margin-top: 20px; line-height: 1.4; text-shadow: 2px 2px 0px white; width: 100%; }
