<style>
    /* ... 前面內容不變 ... */

    /* 勝利畫面調整：確保跑馬燈、圖片、按鈕垂直排列不重疊 */
    #win-layer { 
        display: none; 
        position: absolute; 
        inset: 0; 
        background: white; 
        flex-direction: column; 
        align-items: center; 
        justify-content: space-between; /* 讓內容均勻分佈：頂、中、底 */
        border-radius: 40px; 
        z-index: 5000; 
        padding-bottom: 30px; /* 底部留一點空間給按鈕 */
    }

    marquee { 
        width: 100%; 
        font-size: 3.5rem; 
        color: #ff1493; 
        font-weight: bold; 
        background: #fff0f5; 
        padding: 20px 0; 
        /* 移除 position: absolute 就不會擋住圖片了 */
        border-top-left-radius: 40px;
        border-top-right-radius: 40px;
    }

    #win-img { 
        max-width: 90%; 
        max-height: 55%; /* 限制圖片高度，把空間留給文字和按鈕 */
        object-fit: contain; 
        border-radius: 30px; 
        /* 移除 margin-top: 80px，改由 flex 自動分配空間 */
    }

    .re-btn { 
        padding: 15px 50px; 
        font-size: 2rem; 
        background: #ff8da1; 
        color: white; 
        border: none; 
        border-radius: 15px; 
        cursor: pointer; 
        font-family: inherit; 
    }
</style>

<div id="win-layer">
    <marquee scrollamount="10">答對了！就是 100! 恭喜獲得花椰菜燉燉雞🎉🎉</marquee>
    
    <img id="win-img" src="win_image.png">
    
    <button class="re-btn" onclick="location.reload()">再玩一次</button>
</div>
