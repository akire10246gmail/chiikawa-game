<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花椰菜燉燉雞爭奪戰 - 最終勝利版</title>
    <style>
        body { font-family: 'Arial', 'Microsoft JhengHei', sans-serif; background-color: #fff0f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* 開始畫面 */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff0f5; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; text-align: center; }
        #start-title { font-size: 5rem; font-weight: 900; color: #ff69b4; margin-bottom: 20px; }
        #start-img { width: 400px; height: 400px; border-radius: 40px; object-fit: cover; border: 12px solid white; box-shadow: 0 15px 40px rgba(255, 182, 193, 0.8); margin-bottom: 30px; }
        #start-btn { padding: 25px 70px; font-size: 3.5rem; background-color: #ffb6c1; color: white; border: none; border-radius: 60px; cursor: pointer; font-weight: bold; }

        /* 遊戲主容器 */
        .container { 
            background: white; padding: 3rem; border-radius: 50px; 
            box-shadow: 0 25px 70px rgba(255, 182, 193, 0.6); 
            display: flex; flex-direction: row; align-items: center; 
            border: 10px solid #ffb6c1; max-width: 1100px; width: 90%; min-height: 550px; gap: 40px;
        }

        /* 遊戲區域元件 */
        .pic-area { flex: 1; height: 450px; background: #fffafb; border-radius: 40px; display: flex; justify-content: center; align-items: center; border: 5px dashed #ffe4e1; overflow: hidden; }
        #char-img { max-height: 95%; max-width: 95%; object-fit: contain; }
        
        .info-area { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .speech-bubble-area { display: flex; align-items: center; background: #fff0f5; padding: 15px 30px; border-radius: 60px; border: 4px solid #ffb6c1; margin-bottom: 20px; width: 100%; justify-content: center; gap: 20px; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 4px solid white; background: white; overflow: hidden; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        #msg { font-size: 2.2rem; color: #ff69b4; font-weight: bold; margin: 0; }
        .range-text { font-size: 8rem; font-weight: 900; color: #ff69b4; margin: 15px 0; line-height: 1; }
        .input-group { display: flex; align-items: center; gap: 15px; }
        input { width: 160px; font-size: 3rem; padding: 10px; border: 6px solid #ffb6c1; border-radius: 20px; text-align: center; }
        #go-btn { font-size: 2.2rem; padding: 12px 40px; background: #ffb6c1; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }

        /* 勝利畫面層 (完全獨立) */
        #win-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 1500; flex-direction: column; align-items: center; justify-content: center; 
        }

        /* 跑馬燈置頂 */
        #marquee-box {
            position: fixed; top: 20px; width: 100%; overflow: hidden; white-space: nowrap; z-index: 1600;
        }
        #marquee-text {
            display: inline-block; font-size: 4rem; color: #ff1493; font-weight: 900;
            animation: marqueeMove 8s linear infinite; text-shadow: 2px 2px 0px #fff;
        }
        @keyframes marqueeMove {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        #win-img { max-width: 80%; max-height: 60%; border-radius: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-top: 50px; }
        .re-btn { margin-top: 30px; background:#ff8da1; color: white; border: none; padding: 15px 50px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 2.2rem; }

        .shake { animation: shakeEffect 0.15s infinite; }
        @keyframes shakeEffect { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(3px, 3px); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="start-overlay">
    <div id="start-title">花椰菜燉燉雞爭奪戰</div>
    <img id="start-img" src="poster.png" onerror="this.src='https://i.imgur.com/8QO9M9F.png'">
    <button id="start-btn" onclick="startGame()">開始遊戲!</button>
</div>

<audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
<audio id="sound-win"><source src="win.mp3" type="audio/mpeg"></audio>

<div class="container" id="game-ui">
    <div class="pic-area" id="box">
        <img id="char-img" src="https://i.giphy.com/media/kKtAJrJUQnuikFZr3c/giphy.gif">
    </div>
    <div class="info-area">
        <div class="speech-bubble-area">
            <div class="avatar"><img id="avatar-img" src="face1.png"></div>
            <p id="msg">準備好了嗎？</p>
        </div>
        <div class="range-text"><span id="low">1</span> ~ <span id="high">328</span></div>
        <div class="input-group">
            <input type="number" id="num-in" placeholder="??" inputmode="numeric">
            <button id="go-btn" onclick="check()">猜！</button>
        </div>
    </div>
</div>

<div id="win-screen">
    <div id="marquee-box">
        <div id="marquee-text">
            答對了！就是 100! 恭喜獲得花椰菜燉燉雞🎉🎉 &nbsp;&nbsp;&nbsp;&nbsp; 答對了！就是 100! 恭喜獲得花椰菜燉燉雞🎉🎉
        </div>
    </div>
    <img id="win-img" src="win_image.png">
    <button class="re-btn" onclick="location.reload()">再玩一次</button>
</div>

<script>
    var ans = 100, L = 1, R = 328;
    var bgm = document.getElementById('bgm'), winSound = document.getElementById('sound-win');
    var numInNode = document.getElementById('num-in'), msgNode = document.getElementById('msg'), avatarNode = document.getElementById('avatar-img');
    var avatars = ["face1.png", "face2.png", "face3.png", "face4.png", "face5.png", "face6.png", "face7.png", "face8.png", "face9.png"];

    function startGame() {
        document.getElementById('start-overlay').style.display = 'none';
        bgm.play().catch(e => console.log("Audio blocked"));
        numInNode.focus();
    }

    function check() {
        var val = parseInt(numInNode.value);
        if (isNaN(val) || val <= L || val >= R) {
            msgNode.innerText = "超出範圍了！";
            return;
        }
        
        document.getElementById('box').classList.add('shake');
        avatarNode.src = avatars[Math.floor(Math.random() * avatars.length)];

        setTimeout(function() {
            document.getElementById('box').classList.remove('shake');
            if (val === ans) {
                bgm.pause();
                document.getElementById('game-ui').style.display = 'none';
                document.getElementById('win-screen').style.display = 'flex';
                winSound.play().catch(e => {});
            } else {
                if (val < ans) L = val; else R = val;
                document.getElementById('low').innerText = L;
                document.getElementById('high').innerText = R;
                msgNode.innerText = val < ans ? "太小了！" : "太大了！";
                
                var gifs = ["f6v1HAqfj2svgGAqh9", "eKu950i97lkBafzJ0t", "fSEoD7tXf6esHkpwpN", "SH2GeSdLkdyxix7B7S"];
                document.getElementById('char-img').src = "https://i.giphy.com/media/" + gifs[Math.floor(Math.random()*gifs.length)] + "/giphy.gif";
                
                numInNode.value = ""; 
                numInNode.focus();
            }
        }, 600);
    }
    
    numInNode.onkeyup = function(e) { if (e.keyCode === 13) check(); };
</script>
</body>
</html>
