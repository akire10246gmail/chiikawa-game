<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花椰菜燉燉雞爭奪戰</title>
    <style>
        body { font-family: 'Arial', 'Microsoft JhengHei', sans-serif; background-color: #fff0f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* 開始畫面 */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff0f5; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        #start-title { font-size: 5rem; font-weight: 900; color: #ff69b4; margin-bottom: 20px; }
        #start-btn { padding: 25px 70px; font-size: 3.5rem; background-color: #ffb6c1; color: white; border: none; border-radius: 60px; cursor: pointer; font-weight: bold; }

        /* 主容器 */
        .container { 
            background: white; padding: 2rem; border-radius: 50px; 
            box-shadow: 0 25px 70px rgba(255, 182, 193, 0.6); 
            display: flex; flex-direction: row; align-items: center; 
            border: 10px solid #ffb6c1; max-width: 1200px; width: 95%; min-height: 700px; gap: 30px;
        }

        /* 遊戲區域 */
        .pic-area { flex: 1; height: 500px; background: #fffafb; border-radius: 40px; display: flex; justify-content: center; align-items: center; border: 5px dashed #ffe4e1; overflow: hidden; }
        #char-img { max-height: 95%; max-width: 95%; object-fit: contain; }
        .info-area { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .range-text { font-size: 8rem; font-weight: 900; color: #ff69b4; margin: 20px 0; }
        input { width: 180px; font-size: 3.5rem; padding: 15px; border: 6px solid #ffb6c1; border-radius: 25px; text-align: center; }
        #go-btn { font-size: 2.5rem; padding: 15px 50px; background: #ffb6c1; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }

        /* 勝利畫面 (修正重點：文字在上，影片在下) */
        #win-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        
        #win-msg { 
            font-size: 3.5rem; 
            color: #ff1493; 
            font-weight: 900; 
            background: rgba(255, 255, 255, 0.8); 
            padding: 20px; 
            border-radius: 30px; 
            border: 5px solid #ffb6c1;
            margin-bottom: 20px; 
            line-height: 1.4;
            z-index: 10;
        }
        
        #win-video { width: 85%; max-width: 900px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        .re-btn { background:#ff8da1; color: white; border: none; padding: 15px 40px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 1.8rem; margin-top: 20px; }
        .shake { animation: shakeEffect 0.15s infinite; }
        @keyframes shakeEffect { 0% { transform: translate(4px, 4px); } 50% { transform: translate(-4px, -4px); } 100% { transform: translate(4px, 4px); } }
    </style>
</head>
<body>

<div id="start-overlay">
    <div id="start
