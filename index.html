<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花椰菜燉燉雞爭奪戰</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* 套用粉圓字型系列 */
        body { 
            font-family: 'jf-openhuninn', '粉圓', 'jf open huninn', "Microsoft JhengHei", "微軟正黑體", sans-serif; 
            background-color: #fff0f5; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }
        
        #start-overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #fff0f5; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999; 
        }
        #start-title { font-size: 5rem; font-weight: 900; color: #ff69b4; margin-bottom: 20px; text-shadow: 3px 3px 0px white; }
        
        .poster-box {
            width: 400px; height: 400px; border-radius: 50px; 
            border: 12px solid white; overflow: hidden;
            box-shadow: 0 15px 35px rgba(255,182,193,0.6); margin-bottom: 30px;
            background: #ffe4e1;
        }
        #start-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        #start-btn { padding: 25px 80px; font-size: 3.5rem; background: #ffb6c1; color: white; border: none; border-radius: 60px; cursor: pointer; font-weight: bold; font-family: inherit; }

        .container { background: white; padding: 2.5rem; border-radius: 50px; border: 10px solid #ffb6c1; width: 90%; max-width: 1000px; display: flex; align-items: center; gap: 40px; position: relative; }
        .pic-area { flex: 1; height: 400px; display: flex; justify-content: center; align-items: center; }
