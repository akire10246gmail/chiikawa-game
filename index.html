<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花椰菜燉燉雞爭奪戰</title>
    <style>
        body { font-family: sans-serif; background-color: #fff0f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        #start-overlay { position: fixed; inset: 0; background: #fff0f5; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #start-btn { padding: 30px 60px; font-size: 3rem; background: #ffb6c1; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }

        .container { background: white; padding: 2rem; border-radius: 40px; border: 8px solid #ffb6c1; width: 90%; max-width: 1000px; display: flex; align-items: center; gap: 30px; position: relative; }

        .pic-area { flex: 1; height: 400px; display: flex; justify-content: center; align-items: center; }
        #char-img { max-width: 100%; max-height: 100%; border-radius: 20px; }

        .info-area { flex: 1; text-align: center; }
        .avatar-box { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #ffb6c1; overflow: hidden; margin: 0 auto 10px; background: white; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        #msg { font-size: 2rem; color: #ff69b4; font-weight: bold; margin: 5px 0; }
        .range-text { font-size: 6rem; font-weight: 900; color: #ff69b4; margin: 15px 0; }
        input { width: 150px; font-size: 3rem; text-align: center; border: 4px solid #ffb6c1; border-radius: 15px; outline: none; }
        #go-btn { font-size: 2rem; padding: 10px 30px; background: #ffb6c1; color: white; border: none; border-radius: 15px; cursor: pointer; }

        #win-layer { 
            display: none; position: absolute; inset: 0; background: white; 
            flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 32px; z-index: 5000; 
        }
        /* 跑馬燈速度調慢 */
        marquee { width: 100%; font-size: 3.5rem; color: #ff1493; font-weight: bold; background: #fff0f5; padding: 10px 0; position: absolute; top: 0; }
        #win-img { max-width: 80%; max-height: 70%; margin-top: 60px; border-radius: 20px; }
        .re-btn { margin-top: 20px; padding: 10px 40px; font-size: 1.5rem; background: #ff8da1; color: white; border: none; border-radius: 10px; cursor: pointer; }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, 2px); } }
    </style>
</head>
<body>

<div id="start-overlay">
    <h1 style="font-size: 4rem; color: #ff69b4;">花椰菜燉燉雞爭奪戰</h1>
    <button id="start-btn" onclick="startGame()">開始遊戲</button>
</div>

<div class="container">
    <div class="pic-area" id="pic-box">
        <img id="char-img" src="https://i.giphy.com/media/kKtAJrJUQnuikFZr3c/giphy.gif">
    </div>
    
    <div class="info-area">
        <div class="avatar-box"><img id="avatar-img" src="face1.png"></div>
        <p id="msg">準備好了嗎？</p>
        <div class="range-text"><span id="low">1</span>~<span id="high">328</span></div>
        <input type="number" id="num-in" placeholder="??">
        <button id="go-btn" onclick="check()">猜！</button>
    </div>

    <div id="win-layer">
        <marquee scrollamount="8">答對了！就是 100! 恭喜獲得花椰菜燉燉雞🎉🎉 答對了！就是 100! 恭喜獲得花椰菜燉燉雞🎉🎉</marquee>
        <img id="win-img" src="win_image.png">
        <button class="re-btn" onclick="location.reload()">再玩一次</button>
    </div>
</div>

<audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
<audio id="sound-win"><source src="win.mp3" type="audio/mpeg"></audio>

    var faces = ["face1.png", "face2.png", "face3.png", "face4.png", "face5.png", "face6.png", "face7.png", "face8.png", "face9.png"];

        numIn.focus();

        lastFaceIdx
