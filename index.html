<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花椰菜燉燉雞爭奪戰 - 最終勝利版</title>
    <style>
        body { font-family: 'Arial', 'Microsoft JhengHei', sans-serif; background-color: #fff0f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* 開始畫面 */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 240, 245, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        #start-title { font-size: 5rem; font-weight: 900; color: #ff69b4; margin-bottom: 20px; text-shadow: 4px 4px 0px white; }
        #start-img { width: 450px; height: 450px; border-radius: 40px; object-fit: cover; border: 12px solid white; box-shadow: 0 15px 40px rgba(255, 182, 193, 0.8); margin-bottom: 30px; }
        #start-btn { padding: 25px 70px; font-size: 3.5rem; background-color: #ffb6c1; color: white; border: none; border-radius: 60px; cursor: pointer; box-shadow: 0 10px 25px rgba(255, 182, 193, 0.8); transition: 0.2s; font-weight: bold; }

        /* 遊戲主容器 */
        .container { 
            background: white; padding: 3rem; border-radius: 50px; 
            box-shadow: 0 25px 70px rgba(255, 182, 193, 0.6); 
            display: flex; flex-direction: row; align-items: center; 
            border: 10px solid #ffb6c1; max-width: 1200px; width: 95%; min-height: 600px; gap: 50px; transition: 0.5s;
        }

        /* 答對時的容器狀態 */
        .container.win-layout { flex-direction: column !important; justify-content: center; text-align: center; height: auto; }

        /* 左側圖片區 */
        .pic-area { flex: 1; height: 500px; background: #fffafb; border-radius: 40px; display: flex; justify-content: center; align-items: center; border: 5px dashed #ffe4e1; overflow: hidden; position: relative; transition: 0.5s; }
        .pic-area.win-pic-full { width: 100%; height: 500px; flex: none; border: none; background: transparent; }
        #char-img, #win-img { max-height: 95%; max-width: 95%; object-fit: contain; border-radius: 20px; }

        /* 右側控制區 */
        .info-area { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        .speech-bubble-area { display: flex; align-items: center; background: #fff0f5; padding: 20px 40px; border-radius: 60px; border: 4px solid #ffb6c1; margin-bottom: 20px; width: 100%; justify-content: center; gap: 30px; }
        .avatar { width: 110px; height: 110px; border-radius: 50%; border: 4px solid white; background: white; overflow: hidden; flex-shrink: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        #msg { font-size: 2.8rem; color: #ff69b4; font-weight: bold; margin: 0; }

        .range-text { font-size: 9rem; font-weight: 900; color: #ff69b4; margin: 20px 0; line-height: 1; }
        
        .input-group { display: flex; align-items: center; gap: 20px; margin-top: 20px; }
        input { width: 180px; font-size: 3.5rem; padding: 15px; border: 6px solid #ffb6c1; border-radius: 25px; text-align: center; outline: none; }
        #go-btn { font-size: 2.5rem; padding: 15px 50px; background: #ffb6c1; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        
        /* 勝利訊息文字 */
        #win-msg { font-size: 3.5rem; color: #ff1493; font-weight: 900; margin-top: 30px; line-height: 1.5; text-shadow: 2px 2px 0px white; }
        #re-btn { background:#ff8da1; color: white; border: none; padding: 20px 60px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 2.2rem; margin-top: 30px; }
        
        .shake { animation: shakeEffect 0.15s infinite; }
        @keyframes shakeEffect { 0% { transform: translate(4px, 4px); } 50% { transform: translate(-4px, -4px); } 100% { transform: translate(4px, 4px); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="start-overlay">
    <div id="start-title">花椰菜燉燉雞爭奪戰</div>
    <img id="start-img" src="poster.png" onerror="this.src='https://i.imgur.com/8QO9M9F.png'">
    <button id="start-btn" onclick="startGame()">開始遊戲!</button>
</div>

<audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
<audio id="sound-win"><source src="win.mp3" type="audio/mpeg"></audio>

<div class="container" id="main-container">
    <div class="pic-area" id="box">
        <img id="char-img" src="https://i.giphy.com/media/kKtAJrJUQnuikFZr3c/giphy.gif">
        <img id="win-img" class="hidden" src="win_image.png">
    </div>

    <div class="info-area" id="info-section">
        <div class="speech-bubble-area" id="bubble-zone">
            <div class="avatar"><img id="avatar-img" src="face1.png"></div>
            <p id="msg">...</p>
        </div>

        <div id="game-controls">
            <div class="range-text"><span id="low">1</span> ~ <span id="high">328</span></div>
            <div class="input-group">
                <input type="number" id="num-in" placeholder="??" inputmode="numeric">
                <button id="go-btn" onclick="check()">猜！</button>
            </div>
        </div>

        <div id="win-msg" class="hidden">
            答對了！就是 100!<br>恭喜獲得花椰菜燉燉雞🎉🎉
        </div>
        <button id="re-btn" class="hidden" onclick="location.reload()">再玩一次</button>
    </div>
</div>

<script>
    var ans = 100, L = 1, R = 328;
    var bgm = document.getElementById('bgm'), winSound = document.getElementById('sound-win');
    var msgNode = document.getElementById('msg'), numInNode = document.getElementById('num-in');
    var avatarNode = document.getElementById('avatar-img'), charImg = document.getElementById('char-img'), winImg = document.getElementById('win-img');
    var mainContainer = document.getElementById('main-container'), infoSection = document.getElementById('info-section'), gameControls = document.getElementById('game-controls'), bubbleZone = document.getElementById('bubble-zone');
    
    var avatars = ["face1.png", "face2.png", "face3.png", "face4.png", "face5.png", "face6.png", "face7.png", "face8.png", "face9.png"];

    function changeAvatarRandomly() {
        avatarNode.src = avatars[Math.floor(Math.random() * avatars.length)];
    }

    function startGame() {
        document.getElementById('start-overlay').style.display = 'none';
        bgm.play().catch(e => {});
        avatarNode.src = "face1.png";
        msgNode.innerText = "準備好了嗎？";
        numInNode.focus();
    }

    function check() {
        var val = parseInt(numInNode.value);
        if (isNaN(val) || val <= L || val >= R) {
            msgNode.innerText = "超出範圍了！";
            return;
        }
        document.getElementById('go-btn').disabled = true;
        document.getElementById('box').className = "pic-area shake";
        changeAvatarRandomly();

        setTimeout(function() {
            document.getElementById('box').className = "pic-area";
            if (val === ans) {
                // 1. 隱藏遊戲元素
                charImg.classList.add('hidden');
                gameControls.classList.add('hidden');
                bubbleZone.classList.add('hidden');
                
                // 2. 切換佈局與顯示圖片
                mainContainer.classList.add('win-layout');
                document.getElementById('box').classList.add('win-pic-full');
                winImg.classList.remove('hidden');
                
                // 3. 顯示勝利文字與按鈕
                document.getElementById('win-msg').classList.remove('hidden');
                document.getElementById('re-btn').classList.remove('hidden');
                
                // 4. 音效切換
                bgm.pause(); 
                winSound.play();
            } else {
                if (val < ans) L = val; else R = val;
                document.getElementById('low').innerText = L;
                document.getElementById('high').innerText = R;
                msgNode.innerText = val < ans ? "太小了！" : "太大了！";
                var gifs = ["f6v1HAqfj2svgGAqh9", "eKu950i97lkBafzJ0t", "fSEoD7tXf6esHkpwpN", "SH2GeSdLkdyxix7B7S"];
                charImg.src = "https://i.giphy.com/media/" + gifs[Math.floor(Math.random()*gifs.length)] + "/giphy.gif";
                document.getElementById('go-btn').disabled = false;
                numInNode.value = ""; numInNode.focus();
            }
        }, 600);
    }
    numInNode.onkeyup = function(e) { if (e.keyCode === 13) check(); };
</script>
</body>
</html>
