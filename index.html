<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>遊戲測試</title>
    <style>
        body { background-color: #fff0f5; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .box { background: white; border: 5px solid #ffb6c1; display: inline-block; padding: 20px; border-radius: 20px; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hidden { display: none !important; }
        h1 { color: #ff69b4; font-size: 3rem; }
        button { font-size: 2rem; padding: 10px 40px; background: #ffb6c1; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .range { font-size: 5rem; font-weight: bold; color: #ff69b4; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>花椰菜燉燉雞遊戲</h1>
    <img src="poster.png" alt="[找不到封面圖 poster.png]" style="width:200px; margin-bottom:20px;">
    <button onclick="startGame()">點我開始遊戲</button>
</div>

<div class="box">
    <div id="game-ui">
        <img id="avatar" src="face1.png" alt="[頭像]" style="width:100px; border-radius:50%;">
        <p id="msg" style="font-size:1.5rem; color:#ff69b4;">請輸入數字</p>
        <div class="range"><span id="low">1</span> ~ <span id="high">328</span></div>
        <input type="number" id="num" style="font-size:2rem; width:100px;">
        <button onclick="check()">猜！</button>
    </div>

    <div id="win-ui" class="hidden">
        <h2 style="color:red; font-size:2.5rem;">答對了！就是 100!</h2>
        <p style="font-size:1.5rem;">恭喜獲得花椰菜燉燉雞🎉🎉</p>
        <video id="v" width="400" playsinline><source src="win_video.mp4" type="video/mp4"></video>
        <br>
        <button onclick="location.reload()">再玩一次</button>
    </div>
</div>

<audio id="b" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
<audio id="s"><source src="win.mp3" type="audio/mpeg"></audio>

<script>
    var ans = 100, L = 1, R = 328;
    var avatars = ["face1.png","face2.png","face3.png","face4.png","face5.png","face6.png","face7.png","face8.png","face9.png"];

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('b').play().catch(e => console.log("Audio block"));
    }

    function check() {
        var input = document.getElementById('num');
        var val = parseInt(input.value);
        var msg = document.getElementById('msg');

        if (isNaN(val) || val <= L || val >= R) {
            alert("請輸入範圍內的數字！");
            return;
        }

        // 換頭像
        document.getElementById('avatar').src = avatars[Math.floor(Math.random()*avatars.length)];

        if (val === ans) {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('win-ui').classList.remove('hidden');
            document.getElementById('v').play();
            document.getElementById('b').pause();
            document.getElementById('s').play();
        } else {
            if (val < ans) L = val; else R = val;
            document.getElementById('low').innerText = L;
            document.getElementById('high').innerText = R;
            msg.innerText = val < ans ? "太小了！" : "太大了！";
            input.value = "";
            input.focus();
        }
    }
</script>
</body>
</html>
