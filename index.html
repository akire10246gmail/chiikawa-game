<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花椰菜燉燉雞爭奪戰</title>
    <style>
        body { font-family: sans-serif; background-color: #fff0f5; margin: 0; text-align: center; overflow-x: hidden; }
        
        /* 封面 */
        #start-overlay { position: fixed; inset: 0; background: #fff0f5; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #start-img { width: 300px; height: 300px; border-radius: 20px; object-fit: cover; border: 5px solid white; }
        #start-btn { margin-top: 20px; padding: 20px 50px; font-size: 2.5rem; background: #ffb6c1; color: white; border: none; border-radius: 40px; cursor: pointer; }

        /* 遊戲區域 */
        .container { display: block; max-width: 600px; margin: 20px auto; background: white; padding: 20px; border-radius: 20px; border: 5px solid #ffb6c1; position: relative; }
        #char-img { width: 100%; max-height: 300px; object-fit: contain; border-radius: 10px; }
        .avatar-box { width: 60px; height: 60px; margin: 10px auto; border-radius: 50%; overflow: hidden; border: 2px solid #ffb6c1; }
        .avatar-box img { width: 100%; height: 100%; }
        .range-text { font-size: 5rem; font-weight: bold; color: #ff69b4; margin: 10px 0; }
        input { width: 120px; font-size: 2.5rem; text-align: center; border: 3px solid #ffb6c1; border-radius: 10px; }
        #go-btn { font-size: 1.8rem; padding: 10px 30px; background: #ffb6c1; color: white; border: none; border-radius: 10px; cursor: pointer; vertical-align: middle; }

        /* 勝利層 */
        #win-layer { display: none; position: absolute; inset: 0; background: white; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; border-radius: 15px; }
        marquee { width: 100%; font-size: 2.5rem; color: #ff1493; font-weight: bold; background: #fff0f5; position: absolute; top: 0; }
        #win-img { max-width: 90%; max-height: 70%; margin-top: 50px; }
    </style>
</head>
<body>

<div id="start-overlay">
    <h1 style="color:#ff69b4;">花椰菜燉燉雞爭奪戰</h1>
    <img id="start-img" src="poster.png" onerror="this.src='https://i.imgur.com/8QO9M9F.png'">
    <button id="start-btn" onclick="startGame()">開始遊戲</button>
</div>

<div class="container">
    <img id="char-img" src="https://i.giphy.com/media/kKtAJrJUQnuikFZr3c/giphy.gif">
    <div class="avatar-box"><img id="avatar-img" src="face1.png"></div>
    <p id="msg" style="color:#ff69b4; font-weight:bold;">準備好了嗎？</p>
    <div class="range-text"><span id="low">1</span>~<span id="high">328</span></div>
    <input type="number" id="num-in" inputmode="numeric">
    <button id="go-btn" onclick="check()">猜！</button>

    <div id="win-layer">
        <marquee scrollamount="8">答對了！就是 100! 恭喜獲得花椰菜燉燉雞🎉🎉</marquee>
        <img id="win-img" src="win_image.png">
        <button style="margin-top:10px;" onclick="location.reload()">再玩一次</button>
    </div>
</div>

<audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
<audio id="sound-win"><source src="win.mp3" type="audio/mpeg"></audio>

<script>
    var ans = 100, L = 1, R = 328;
    var lastGifIdx = -1, lastFaceIdx = 0;
    var gifs = ["f6v1HAqfj2svgGAqh9", "eKu950i97lkBafzJ0t", "fSEoD7tXf6esHkpwpN", "SH2GeSdLkdyxix7B7S"];
    var faces = ["face1.png", "face2.png", "face3.png", "face4.png", "face5.png", "face6.png", "face7.png", "face8.png", "face9.png"];

    function startGame() {
        document.getElementById('start-overlay').style.display = 'none';
        document.getElementById('bgm').play().catch(e=>{});
        document.getElementById('num-in').focus();
    }

    function check() {
        var val = parseInt(document.getElementById('num-in').value);
        if (isNaN(val) || val <= L || val >= R) return;

        if (val === ans) {
            document.getElementById('bgm').pause();
            document.getElementById('win-layer').style.display = 'flex';
            document.getElementById('sound-win').play().catch(e=>{});
        } else {
            if (val < ans) L = val; else R = val;
            document.getElementById('low').innerText = L;
            document.getElementById('high').innerText = R;
            document.getElementById('msg').innerText = val < ans ? "太小了！" : "太大了！";
            
            // 更換 Face (不重複)
            var nF; do { nF = Math.floor(Math.random()*faces.length); } while(nF === lastFaceIdx);
            lastFaceIdx = nF;
            document.getElementById('avatar-img').src = faces[nF];

            // 更換 GIF (不重複)
            var nG; do { nG = Math.floor(Math.random()*gifs.length); } while(nG === lastGifIdx);
            lastGifIdx = nG;
            document.getElementById('char-img').src = "https://i.giphy.com/media/" + gifs[nG] + "/giphy.gif";

            document.getElementById('num-in').value = "";
            document.getElementById('num-in').focus();
        }
    }
    document.getElementById('num-in').onkeyup = function(e){ if(e.keyCode===13) check(); };
</script>
</body>
</html>
