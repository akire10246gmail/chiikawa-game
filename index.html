<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花椰菜燉燉雞爭奪戰</title>
    <style>
        body { font-family: 'Arial', 'Microsoft JhengHei', sans-serif; background-color: #fff0f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 240, 245, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        #start-title { font-size: 3.5rem; font-weight: 900; color: #ff69b4; margin-bottom: 20px; text-shadow: 2px 2px 0px white; }
        #start-img { width: 320px; height: 320px; border-radius: 30px; object-fit: cover; border: 8px solid white; box-shadow: 0 10px 30px rgba(255, 182, 193, 0.8); margin-bottom: 30px; }
        #start-btn { padding: 20px 50px; font-size: 2.8rem; background-color: #ffb6c1; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 8px 20px rgba(255, 182, 193, 0.8); transition: 0.2s; font-weight: bold; }
        #start-btn:hover { transform: scale(1.1); background-color: #ff8da1; }
        .container { background: white; padding: 2.5rem; border-radius: 40px; box-shadow: 0 20px 60px rgba(255, 182, 193, 0.6); display: flex; flex-direction: column; align-items: center; border: 8px solid #ffb6c1; max-width: 900px; width: 90%; gap: 15px; }
        .pic-area { width: 100%; height: 320px; background: #fffafb; border-radius: 30px; display: flex; justify-content: center; align-items: center; border: 3px dashed #ffe4e1; overflow: hidden; position: relative; }
        #char-img, #win-video { max-height: 90%; max-width: 90%; object-fit: contain; }
        .speech-bubble-area { display: flex; align-items: center; background: #fff0f5; padding: 12px 25px; border-radius: 50px; border: 3px solid #ffb6c1; margin: 10px 0; width: 85%; justify-content: center; gap: 20px; }
        .avatar { width: 85px; height: 85px; border-radius: 50%; border: 3px solid white; background: white; overflow: hidden; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        #msg { font-size: 2rem; color: #ff69b4; font-weight: bold; margin: 0; }
        .range-text { font-size: 6.5rem; font-weight: 900; color: #ff69b4; margin: 5px 0; line-height: 1; }
        .input-group { display: flex; align-items: center; gap: 15px; }
        input { width: 130px; font-size: 2.3rem; padding: 10px; border: 5px solid #ffb6c1; border-radius: 18px; text-align: center; outline: none; }
        #go-btn { font-size: 1.8rem; padding: 12px 35px; background: #ffb6c1; color: white; border: none; border-radius: 18px; cursor: pointer; font-weight: bold; }
        #re-btn { background:#ff8da1; color: white; border: none; padding: 15px; border-radius: 18px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1.8rem; margin-top: 10px; }
        .shake { animation: shakeEffect 0.15s infinite; }
        @keyframes shakeEffect { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(3px, 3px); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="start-overlay">
    <div id="start-title">花椰菜燉燉雞爭奪戰</div>
    <img id="start-img" src="poster.png" onerror="this.src='https://i.imgur.com/8QO9M9F.png'">
    <button id="start-btn" onclick="startGame()">開始遊戲!</button>
</div>

<audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
<audio id="sound-win"><source src="win.mp3" type="audio/mpeg"></audio>

<div class="container">
    <div class="pic-area" id="box">
        <img id="char-img" src="https://i.giphy.com/media/kKtAJrJUQnuikFZr3c/giphy.gif">
        <video id="win-video" class="hidden" playsinline>
            <source src="win_video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="speech-bubble-area">
        <div class="avatar"><img id="avatar-img" src="face1.png"></div>
        <p id="msg">...</p>
    </div>

    <div class="range-text"><span id="low">1</span> ~ <span id="high">328</span></div>

    <div class="input-group">
        <input type="number" id="num-in" placeholder="??" inputmode="numeric">
        <button id="go-btn" onclick="check()">猜！</button>
    </div>
    <button id="re-btn" class="hidden" onclick="location.reload()">再玩一次</button>
</div>

<script>
    var ans = 100, L = 1, R = 328;
    var bgm = document.getElementById('bgm');
    var winSound = document.getElementById('sound-win');
    var msgNode = document.getElementById('msg');
    var numInNode = document.getElementById('num-in');
    var avatarNode = document.getElementById('avatar-img');
    var charImg = document.getElementById('char-img');
    var winVideo = document.getElementById('win-video');

    var avatars = ["face1.png", "face2.png", "face3.png", "face4.png", "face5.png", "face6.png", "face7.png", "face8.png", "face9.png"];

    function changeAvatarRandomly() {
        var randomIdx = Math.floor(Math.random() * avatars.length);
        avatarNode.src = avatars[randomIdx];
    }

    function startGame() {
        document.getElementById('start-overlay').style.display = 'none';
        bgm.play().catch(e => console.log("音樂播放受阻"));
        avatarNode.src = "face1.png";
        msgNode.innerText = "準備好了嗎？";
        numInNode.focus();
    }

    function check() {
        var val = parseInt(numInNode.value);
        if (isNaN(val) || val <= L || val >= R) {
            msgNode.innerText = "超出範圍了！";
            return;
        }
        document.getElementById('go-btn').disabled = true;
        document.getElementById('box').className = "pic-area shake";
        changeAvatarRandomly();

        setTimeout(function() {
            document.getElementById('box').className = "pic-area";
            if (val === ans) {
                // 隱藏原本的圖片，顯示並播放影片
                charImg.classList.add('hidden');
                winVideo.classList.remove('hidden');
                winVideo.play();
                
                msgNode.innerHTML = "答對了！就是 " + ans;
                document.getElementById('re-btn').classList.remove('hidden');
                bgm.pause();
                winSound.play();
            } else {
                if (val < ans) L = val; else R = val;
                document.getElementById('low').innerText = L;
                document.getElementById('high').innerText = R;
                msgNode.innerText = val < ans ? "太小了！再大一點" : "太大了！再小一點";
                
                var gifs = ["f6v1HAqfj2svgGAqh9", "eKu950i97lkBafzJ0t", "fSEoD7tXf6esHkpwpN", "SH2GeSdLkdyxix7B7S"];
                charImg.src = "https://i.giphy.com/media/" + gifs[Math.floor(Math.random()*gifs.length)] + "/giphy.gif";
                
                document.getElementById('go-btn').disabled = false;
                numInNode.value = ""; numInNode.focus();
            }
        }, 600);
    }
    numInNode.onkeyup = function(e) { if (e.keyCode === 13) check(); };
</script>
</body>
</html>
